<svg width="1200" height="640" viewBox="0 0 1200 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Mnemos hero</title>
  <desc id="desc">Reliable scoped memory for coding agents.</desc>
  <defs>
    <linearGradient id="bg" x1="120" y1="40" x2="1040" y2="600" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0E1117"/>
      <stop offset="1" stop-color="#151A22"/>
    </linearGradient>
    <linearGradient id="gold" x1="228" y1="162" x2="870" y2="490" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F2C879"/>
      <stop offset="1" stop-color="#D4A853"/>
    </linearGradient>
    <linearGradient id="line" x1="170" y1="170" x2="930" y2="470" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F2C879" stop-opacity="0.68"/>
      <stop offset="1" stop-color="#D4A853" stop-opacity="0.18"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(258 210) rotate(31.8214) scale(462.952 333.312)">
      <stop stop-color="#D4A853" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#D4A853" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-60" y="-60" width="1320" height="760" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
  </defs>

  <rect width="1200" height="640" rx="28" fill="url(#bg)"/>
  <rect x="24" y="24" width="1152" height="592" rx="22" stroke="#FFFFFF" stroke-opacity="0.08"/>

  <g opacity="0.7">
    <circle cx="250" cy="210" r="220" fill="url(#glow)"/>
    <circle cx="920" cy="500" r="160" fill="url(#glow)"/>
  </g>

  <g stroke="url(#line)" stroke-width="2">
    <path d="M182 448L268 312L412 358L512 236L700 292L856 166" stroke-linecap="round"/>
    <path d="M228 176L410 228L572 156L690 214L822 112L946 176" stroke-linecap="round"/>
    <path d="M268 312L392 156L572 156" stroke-linecap="round"/>
    <path d="M412 358L520 452L700 292" stroke-linecap="round"/>
    <path d="M700 292L846 378L980 310" stroke-linecap="round"/>
    <path d="M520 452L678 504L846 378" stroke-linecap="round"/>
  </g>

  <g fill="url(#gold)">
    <circle cx="182" cy="448" r="14"/>
    <circle cx="228" cy="176" r="18"/>
    <circle cx="268" cy="312" r="12"/>
    <circle cx="392" cy="156" r="9"/>
    <circle cx="412" cy="358" r="13"/>
    <circle cx="512" cy="236" r="15"/>
    <circle cx="520" cy="452" r="11"/>
    <circle cx="572" cy="156" r="16"/>
    <circle cx="678" cy="504" r="10"/>
    <circle cx="700" cy="292" r="18"/>
    <circle cx="822" cy="112" r="10"/>
    <circle cx="846" cy="378" r="14"/>
    <circle cx="856" cy="166" r="16"/>
    <circle cx="946" cy="176" r="12"/>
    <circle cx="980" cy="310" r="14"/>
  </g>

  <g fill="#D7DCE5" font-family="'Segoe UI', Arial, sans-serif">
    <text x="86" y="108" font-size="22" font-weight="700" letter-spacing="3.6" opacity="0.72">LOCAL-FIRST · MCP · PUBLIC BETA</text>
    <text x="82" y="188" font-size="72" font-weight="800" letter-spacing="-2">mnemos</text>
    <text x="82" y="244" font-size="34" font-weight="700" fill="#F4F7FB">Reliable scoped memory for coding agents.</text>
    <text x="84" y="294" font-size="23" font-weight="500" fill="#AAB5C4">
      <tspan x="84" dy="0">Keep project, workspace, and global context separate.</tspan>
      <tspan x="84" dy="34">Rewrite stale facts, compact raw agent history, and stay local by default.</tspan>
    </text>
  </g>

  <g>
    <rect x="84" y="352" width="320" height="54" rx="27" fill="#D4A853"/>
    <text x="244" y="386" text-anchor="middle" fill="#10141B" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="800">PROJECT / WORKSPACE / GLOBAL</text>

    <rect x="418" y="352" width="180" height="54" rx="27" fill="#1B212C" stroke="#2C3647"/>
    <text x="508" y="386" text-anchor="middle" fill="#D7DCE5" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="700">MCP-NATIVE</text>

    <rect x="612" y="352" width="220" height="54" rx="27" fill="#1B212C" stroke="#2C3647"/>
    <text x="722" y="386" text-anchor="middle" fill="#D7DCE5" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="700">BIOMIMETIC CORE</text>
  </g>

  <g>
    <rect x="744" y="306" width="356" height="210" rx="22" fill="#11161F" stroke="#263142"/>
    <text x="776" y="348" fill="#F4F7FB" font-family="'Segoe UI', Arial, sans-serif" font-size="24" font-weight="800">Memory Loop</text>
    <g fill="#AAB5C4" font-family="'Segoe UI', Arial, sans-serif" font-size="19" font-weight="600">
      <text x="776" y="392">1. Retrieve scoped context</text>
      <text x="776" y="430">2. Work with the current repo state</text>
      <text x="776" y="468">3. Store durable facts only</text>
      <text x="776" y="506">4. Consolidate before handoff</text>
    </g>
  </g>
</svg>
