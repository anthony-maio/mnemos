name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e '.[dev]'
      - run: black --check .
      - run: mypy .

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e '.[dev]'
      - run: pytest -q

  benchmark_gate:
    runs-on: ubuntu-latest
    needs: [lint, test]
    strategy:
      matrix:
        include:
          - profile: memory-core
            store: memory
            max_p95_ratio: "2.0"
          - profile: starter-sqlite
            store: sqlite
            max_p95_ratio: "4.0"
          - profile: local-performance-qdrant
            store: qdrant
            max_p95_ratio: "2.25"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e '.[dev,qdrant]'
      - run: python -m mnemos.benchmark --stores ${{ matrix.store }} --retrievers baseline,engine --dataset-pack claim-driving --top-k 1 --gate-min-mrr-lift 0.15 --gate-max-p95-latency-ratio ${{ matrix.max_p95_ratio }} --qdrant-path .mnemos_benchmark_qdrant_${{ matrix.profile }} --enforce-production-gate

  tier1_mcp_smoke:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e '.[dev]'
      - run: pytest -q tests/test_mcp_compatibility.py

  tier2_mcp_smoke:
    runs-on: ubuntu-latest
    needs: [lint, test]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e '.[dev]'
      - run: pytest -q tests/test_mcp_tier2_smoke.py

  release_readiness:
    runs-on: ubuntu-latest
    needs: [benchmark_gate, tier1_mcp_smoke]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e '.[dev,qdrant]'
      - run: pytest -q tests/test_docs_consistency.py tests/test_mcp_compatibility.py
      - run: test -f docs/release-checklist.md
